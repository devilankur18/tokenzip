name: Good First Issue
description: A task suitable for newcomers
title: "[GFI]: "
labels: ["good first issue"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template to describe a task that is well-defined and suitable for someone new to the codebase.
  - type: textarea
    id: task
    attributes:
      label: Task Description
      description: What needs to be done?
    validations:
      required: true
  - type: textarea
    id: guidance
    attributes:
      label: Guidance for Contributors
      description: Where should they look in the code? What are the expected steps?
    validations:
      required: true
